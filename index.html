<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云同步工作任务日历</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #fff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #ded8ce;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --green: #16805b;
      --green-soft: #e8f6ef;
      --orange: #b45309;
      --orange-soft: #fff3df;
      --red: #b42318;
      --red-soft: #ffe8e4;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
    }

    .sidebar {
      background: #1f2933;
      color: #fff;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand h1 { margin: 0; font-size: 22px; }
    .brand p { margin: 8px 0 0; color: #cbd5e1; font-size: 13px; line-height: 1.5; }

    .card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 14px;
    }

    .card h2 { margin: 0 0 10px; font-size: 14px; color: #e5e7eb; }
    .field { display: grid; gap: 5px; margin-bottom: 9px; }
    .field label { font-size: 12px; color: #cbd5e1; font-weight: 700; }
    .field input, .field textarea, .field select {
      width: 100%;
      min-height: 36px;
      border-radius: 7px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      outline: none;
      background: #fff;
      color: var(--ink);
    }
    .field textarea { min-height: 62px; resize: vertical; }

    .btn {
      min-height: 36px;
      border-radius: 7px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--ink);
      background: #eef2f6;
    }
    .btn.primary { color: #fff; background: var(--accent); }
    .btn.danger { color: var(--red); background: var(--red-soft); }
    .btn.ghost { color: #e5e7eb; background: rgba(255,255,255,.10); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .status { font-size: 12px; line-height: 1.5; color: #cbd5e1; margin-top: 8px; }
    .status strong { color: #fff; }
    .hidden { display: none !important; }
    .profile {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
    }
    .profile strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff;
      font-size: 14px;
    }
    .profile span {
      display: block;
      color: #cbd5e1;
      font-size: 12px;
      margin-top: 3px;
    }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat { text-align: center; border-radius: 8px; padding: 10px 8px; background: rgba(255,255,255,.08); }
    .stat strong { display: block; font-size: 20px; }
    .stat span { display: block; margin-top: 4px; color: #cbd5e1; font-size: 12px; }

    .content {
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
    }
    .toolbar h2 { margin: 0; font-size: 24px; }
    .toolbar p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .control {
      display: flex;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
    }
    .tab.active { background: var(--accent); color: #fff; }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 38px rgba(31,41,51,.08);
      overflow: hidden;
      min-width: 0;
    }

    .weekdays, .month {
      display: grid;
      grid-template-columns: repeat(7, minmax(80px, 1fr));
    }
    .weekdays { background: #faf9f6; border-bottom: 1px solid var(--line); }
    .weekdays div { text-align: center; padding: 12px 4px; font-size: 13px; color: var(--muted); font-weight: 700; }
    .month { grid-auto-rows: minmax(110px, 1fr); min-height: 660px; }

    .day {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #fff;
      text-align: left;
      min-width: 0;
    }
    .day:nth-child(7n) { border-right: 0; }
    .day.muted { background: #f8f7f3; color: #9ca3af; }
    .day.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
    .day.today .num { background: var(--accent); color: #fff; }
    .day-head { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }
    .count { color: var(--muted); font-size: 12px; }

    .chip {
      border-radius: 7px;
      padding: 6px 7px;
      font-size: 12px;
      line-height: 1.3;
      background: var(--accent-soft);
      color: #16488f;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chip.done { color: var(--green); background: var(--green-soft); text-decoration: line-through; }
    .chip.milestone { color: var(--orange); background: var(--orange-soft); }
    .chip.range { margin-left: -8px; margin-right: -8px; border-radius: 0; }
    .chip.range-start { margin-left: 0; border-radius: 7px 0 0 7px; }
    .chip.range-end { margin-right: 0; border-radius: 0 7px 7px 0; }
    .chip.range-single { margin-left: 0; margin-right: 0; border-radius: 7px; }
    .chip.q-important_urgent {
      border-left: 4px solid #dc2626;
      background: #fee2e2;
      color: #991b1b;
    }
    .chip.q-important_not_urgent {
      border-left: 4px solid #2563eb;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .chip.q-urgent_not_important {
      border-left: 4px solid #f59e0b;
      background: #fef3c7;
      color: #92400e;
    }
    .chip.q-not_urgent_not_important {
      border-left: 4px solid #64748b;
      background: #e2e8f0;
      color: #475569;
    }

    .week { display: none; grid-template-columns: repeat(7, minmax(130px, 1fr)); min-height: 660px; }
    .week.active { display: grid; }
    .week-col { border-right: 1px solid var(--line); padding: 12px; display: grid; grid-template-rows: auto 1fr; gap: 10px; }
    .week-col:last-child { border-right: 0; }
    .week-title { background: transparent; text-align: left; padding: 0; }
    .week-title strong { display: block; font-size: 16px; }
    .week-title span { color: var(--muted); font-size: 12px; }
    .timeline { display: flex; flex-direction: column; gap: 8px; }
    .time-card {
      border-left: 3px solid var(--accent);
      background: #f8fbff;
      border-radius: 7px;
      padding: 8px;
      text-align: left;
    }
    .time-card.done { border-left-color: var(--green); background: var(--green-soft); }
    .time-card.milestone { border-left-color: var(--orange); background: var(--orange-soft); }
    .time-card strong { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .time-card.q-important_urgent { border-left-color: #dc2626; background: #fee2e2; color: #991b1b; }
    .time-card.q-important_not_urgent { border-left-color: #2563eb; background: #dbeafe; color: #1d4ed8; }
    .time-card.q-urgent_not_important { border-left-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .time-card.q-not_urgent_not_important { border-left-color: #64748b; background: #e2e8f0; color: #475569; }

    .week-task-view { display: none; min-height: 660px; padding: 18px; overflow: auto; }
    .week-task-view.active { display: grid; grid-template-rows: auto auto minmax(0, 1fr); gap: 14px; }
    .week-task-head h3 { margin: 0; font-size: 20px; }
    .week-task-head p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .week-task-form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf8;
    }
    .week-task-list { display: grid; gap: 10px; align-content: start; }
    .week-task-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }
    .week-task-title { font-weight: 800; line-height: 1.35; }
    .week-task-summary {
      width: 100%;
      min-height: 54px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }
    .week-task-summary:hover { background: #fafafa; }
    .week-task-card > .task-actions { padding-right: 10px; }
    .hour-labels { background: #faf9f6; border-right: 1px solid var(--line); }
    .hour-label, .hour-row { min-height: 54px; border-bottom: 1px solid var(--line); padding: 8px 10px; color: var(--muted); font-size: 12px; }
    .hour-task { display: inline-flex; margin: 2px 6px 4px 0; border-radius: 7px; padding: 6px 8px; background: var(--accent-soft); color: #16488f; border-left: 4px solid var(--accent); }
    .hour-task.q-important_urgent { border-left-color: #dc2626; background: #fee2e2; color: #991b1b; }
    .hour-task.q-important_not_urgent { border-left-color: #2563eb; background: #dbeafe; color: #1d4ed8; }
    .hour-task.q-urgent_not_important { border-left-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .hour-task.q-not_urgent_not_important { border-left-color: #64748b; background: #e2e8f0; color: #475569; }

    .side { display: grid; grid-template-rows: auto auto minmax(0, 1fr); }
    .side-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head h3 { margin: 0; font-size: 19px; }
    .side-head span { display: block; margin-top: 5px; color: var(--muted); font-size: 13px; }
    .task-form { padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fbfaf8; }
    .task-form .field label { color: var(--muted); }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tasks { padding: 14px 18px 18px; overflow: auto; display: flex; flex-direction: column; gap: 10px; }
    .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
      background: #fff;
    }
    .task.done { background: #f7fbf8; }
    .task-top { display: grid; grid-template-columns: 20px minmax(0,1fr) auto; gap: 9px; align-items: start; }
    .task-title { font-weight: 800; line-height: 1.35; word-break: break-word; }
    .task.done .task-title { color: var(--green); text-decoration: line-through; }
    .badge { border-radius: 999px; padding: 4px 8px; font-size: 12px; color: #16488f; background: var(--accent-soft); }
    .badge.milestone { color: var(--orange); background: var(--orange-soft); }
    .badge.priority { color: #334155; background: #eef2f7; }
    .badge.p-important_urgent { color: #991b1b; background: #fee2e2; }
    .badge.p-important_not_urgent { color: #1d4ed8; background: #dbeafe; }
    .badge.p-urgent_not_important { color: #92400e; background: #fef3c7; }
    .badge.p-not_urgent_not_important { color: #475569; background: #e2e8f0; }
    .badge.task-origin { color: #0f766e; background: #ccfbf1; }
    .task-origin { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 2px 6px; font-size: 11px; font-weight: 700; line-height: 1; margin-left: 4px; }
    .task.p-important_urgent { border-left: 5px solid #dc2626; }
    .task.p-important_not_urgent { border-left: 5px solid #2563eb; }
    .task.p-urgent_not_important { border-left: 5px solid #f59e0b; }
    .task.p-not_urgent_not_important { border-left: 5px solid #64748b; }
    .priority-legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: -2px 0 8px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .legend-dot.red { background: #dc2626; }
    .legend-dot.blue { background: #2563eb; }
    .legend-dot.orange { background: #f59e0b; }
    .legend-dot.gray { background: #64748b; }
    .meta { color: var(--muted); font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .note { margin: 0; color: #4b5563; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    .task-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .text-btn { background: transparent; color: var(--muted); padding: 4px 6px; border-radius: 5px; }
    .text-btn:hover { background: #f1f3f5; color: var(--ink); }
    .text-btn.danger:hover { background: var(--red-soft); color: var(--red); }
    .empty { color: var(--muted); text-align: center; padding: 24px 10px; border: 1px dashed var(--line); border-radius: 8px; background: #fbfaf8; }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: block; }
      .main { grid-template-columns: 1fr; }
      .side { min-height: 520px; }
    }
    @media (max-width: 760px) {
      .content { padding: 14px; }
      .toolbar { grid-template-columns: 1fr; }
      .control { justify-content: space-between; }
      .weekdays, .month { grid-template-columns: repeat(7, minmax(44px, 1fr)); }
      .month { min-height: 520px; grid-auto-rows: minmax(84px,1fr); }
      .day { padding: 5px; }
      .chip { font-size: 11px; padding: 4px 5px; }
      .week { grid-template-columns: 1fr; }
      .week-col { border-right: 0; border-bottom: 1px solid var(--line); }
      .week-task-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="brand">
        <h1>云同步工作任务日历</h1>
        <p id="todayText"></p>
      </section>

      <input id="supabaseUrl" type="hidden">
      <input id="supabaseKey" type="hidden">
      <button class="hidden" id="saveConfigBtn" type="button">保存配置</button>

      <section class="card" id="accountCard">
        <h2>账号</h2>
        <div id="loginForm">
          <div class="field">
            <label for="email">邮箱</label>
            <input id="email" type="email" autocomplete="email">
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" type="password" autocomplete="current-password">
          </div>
          <div class="btn-row">
            <button class="btn primary" id="signInBtn" type="button">登录</button>
            <button class="btn ghost" id="signUpBtn" type="button">注册</button>
          </div>
        </div>
        <div id="profilePanel" class="hidden">
          <div class="profile">
            <div class="avatar" id="userAvatar">U</div>
            <div>
              <strong id="userEmail">已登录</strong>
              <span>云端同步已开启</span>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn ghost" id="reloadCloudBtn" type="button">刷新云端</button>
            <button class="btn danger" id="signOutBtn" type="button">退出</button>
          </div>
        </div>
        <div class="status" id="authStatus">未登录</div>
        <div class="status" id="cloudStatus">正在连接云端...</div>
      </section>

      <section class="card">
        <h2>本周概览</h2>
        <div class="stats">
          <div class="stat"><strong id="weekTotal">0</strong><span>任务</span></div>
          <div class="stat"><strong id="weekDone">0</strong><span>完成</span></div>
          <div class="stat"><strong id="weekMilestones">0</strong><span>节点</span></div>
        </div>
      </section>
    </aside>

    <section class="content">
      <header class="toolbar">
        <div>
          <h2 id="periodTitle"></h2>
          <p id="periodSubtitle"></p>
        </div>
        <div class="control">
          <button class="btn" id="prevBtn" type="button" aria-label="上一页">&lt;</button>
          <button class="btn" id="todayBtn" type="button">今天</button>
          <button class="btn" id="nextBtn" type="button" aria-label="下一页">&gt;</button>
        </div>
        <div class="control">
          <button class="btn tab active" data-view="month" type="button">月</button>
          <button class="btn tab" data-view="week" type="button">周</button>
          <button class="btn tab" data-view="weekTasks" type="button">任务列表</button>
        </div>
      </header>

      <section class="main">
        <div class="panel">
          <div class="weekdays" id="weekdays">
            <div>周一</div><div>周二</div><div>周三</div><div>周四</div><div>周五</div><div>周六</div><div>周日</div>
          </div>
          <div class="month" id="monthView"></div>
          <div class="week" id="weekView"></div>
          <div class="week-task-view" id="weekTaskView"></div>
        </div>

        <aside class="panel side">
          <div class="side-head">
            <h3 id="selectedTitle"></h3>
            <span id="selectedSummary"></span>
          </div>

          <form class="task-form" id="taskForm">
            <div class="field">
              <label for="taskTitle">任务</label>
              <input id="taskTitle" autocomplete="off" placeholder="例如：整理周报、跟进客户、发货检查">
            </div>
            <div class="split">
              <div class="field">
                <label for="taskDate">开始日期</label>
                <input id="taskDate" type="date">
              </div>
              <div class="field">
                <label for="taskEndDate">结束日期</label>
                <input id="taskEndDate" type="date">
              </div>
            </div>
            <div class="field">
              <label for="taskTime">时间节点</label>
              <input id="taskTime" type="time">
            </div>
            <div class="split">
              <div class="field">
                <label for="taskType">类型</label>
                <select id="taskType">
                  <option value="task">任务</option>
                  <option value="milestone">时间节点</option>
                </select>
              </div>
              <div class="field">
                <label for="taskScope">周期</label>
                <select id="taskScope">
                  <option value="day">当天</option>
                  <option value="week">本周</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="taskPriority">重要程度</label>
              <select id="taskPriority">
                <option value="important_urgent">重要紧急</option>
                <option value="important_not_urgent">重要不紧急</option>
                <option value="urgent_not_important">紧急不重要</option>
                <option value="not_urgent_not_important">不紧急不重要</option>
              </select>
            </div>
            <div class="priority-legend">
              <span class="legend-item"><i class="legend-dot red"></i>重要紧急</span>
              <span class="legend-item"><i class="legend-dot blue"></i>重要不紧急</span>
              <span class="legend-item"><i class="legend-dot orange"></i>紧急不重要</span>
              <span class="legend-item"><i class="legend-dot gray"></i>不紧急不重要</span>
            </div>
            <div class="field">
              <label for="taskNote">备注</label>
              <textarea id="taskNote" placeholder="补充负责人、资料、注意事项"></textarea>
            </div>
            <button class="btn primary" id="submitBtn" type="submit">添加任务</button>
          </form>

          <div class="tasks" id="taskList"></div>
        </aside>
      </section>
    </section>
  </main>

  <script>
    const localTaskKey = "cloud-calendar-local-tasks-v1";
    const localWeeklyTaskKey = "cloud-calendar-weekly-tasks-v1";
    const configKey = "cloud-calendar-supabase-config-v1";
    const embeddedSupabaseConfig = {
      url: "https://scxsrgneitktymuxbxtg.supabase.co",

    function pad(value) { return String(value).padStart(2, "0"); }
    function dateKey(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function parseDate(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }
    function sameDay(a, b) { return dateKey(a) === dateKey(b); }
    function formatCn(date) { return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekNames[date.getDay()]}`; }
    function startOfWeek(date) {
      const copy = new Date(date);
      const day = copy.getDay() || 7;
      copy.setDate(copy.getDate() - day + 1);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }
    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }
    function monthDays(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1);
      const start = startOfWeek(first);
      return Array.from({ length: 42 }, (_, index) => addDays(start, index));
    }
    function sortedTasks(tasks) {
      return [...tasks].sort((a, b) => `${a.date} ${a.time || "99:99"}`.localeCompare(`${b.date} ${b.time || "99:99"}`));
    }
    function tasksForDay(date) {
      const key = dateKey(date);
      return sortedTasks(state.tasks.filter(task => key >= task.date && key <= (task.endDate || task.date)));
    }
    function rangeClass(task, day) {
      const key = dateKey(day);
      const start = task.date;
      const end = task.endDate || task.date;
      if (start === end) return "range-single";
      if (key === start) return "range range-start";
      if (key === end) return "range range-end";
      return "range";
    }
    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }
    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") return window.crypto.randomUUID();
      return `task-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }
    function priorityLabel(value) {
      return {
        important_urgent: "重要紧急",
        important_not_urgent: "重要不紧急",
        urgent_not_important: "紧急不重要",
        not_urgent_not_important: "不紧急不重要"
      }[value] || "重要紧急";
    }
    function dateRangeLabel(task) {
      const end = task.endDate || task.date;
      return task.date === end ? task.date : `${task.date} 至 ${end}`;
    }
    function taskOriginLabel(task) {
      return task.scope === "week" ? "WK" : "";
    }

    function toDb(task) {

    async function upsertTaskCloud(task) {
      const payload = toDb(task);
      for (let attempt = 0; attempt < 4; attempt++) {
        const result = await state.supabase.from("calendar_tasks").upsert(payload, { onConflict: "id" });
        if (!result.error) return null;
        const missing = (result.error.message || "").match(/task_(?:end_date|scope|priority)/i)?.[0];
        if (!missing || !(missing in payload)) return result.error;
        delete payload[missing];
      }
      return new Error("云端任务表字段不完整");
    }

      return {

        title: row.title,
        date: row.task_date,
        endDate: row.task_end_date || row.task_date,

        priority: row.task_priority || "important_urgent",
        note: row.note || "",

      const { data, error } = await state.supabase
        .from("calendar_tasks")
        .select("*")
        .order("task_date", { ascending: true })
        .order("task_time", { ascending: true });
      if (error) {
        state.syncing = false;
        setCloudStatus(`云端读取失败：${error.message}`);
        return;
      }
      const { data: weeklyData, error: weeklyError } = await state.supabase
        .from("weekly_task_items")
        .select("*")
        .order("week_start", { ascending: false })
        .order("created_at", { ascending: true });
      state.syncing = false;
      if (weeklyError) {
        setCloudStatus(`周任务读取失败：${weeklyError.message}`);
        return;
      }
      state.tasks = data.map(fromDb);
      state.weeklyTasks = weeklyData.map(weeklyFromDb);

    function normalizeSupabaseUrl(value) {

      } catch {
        return raw.replace(/\/rest\/v1.*$/i, "").replace(/\/auth\/v1.*$/i, "").replace(/\/+$/, "");

      els.date.value = dateKey(state.selected);
      els.endDate.value = dateKey(state.selected);
      els.submit.textContent = "添加任务";
    }

    document.querySelectorAll(".tab[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        state.view = button.dataset.view;
        render();
      });
    });

    els.prevBtn.addEventListener("click", () => {
      state.cursor = state.view === "month"
        ? new Date(state.cursor.getFullYear(), state.cursor.getMonth() - 1, 1)
        : addDays(state.cursor, -7);
      state.selected = new Date(state.cursor);
      render();
    });

    els.nextBtn.addEventListener("click", () => {
      state.cursor = state.view === "month"
        ? new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, 1)
        : addDays(state.cursor, 7);
      state.selected = new Date(state.cursor);
      render();
    });

    els.todayBtn.addEventListener("click", () => {
      state.cursor = new Date();
      state.selected = new Date();
      render();
    });

    els.reloadCloudBtn.addEventListener("click", loadCloud);

    els.form.addEventListener("submit", async event => {
      event.preventDefault();
      const title = els.title.value.trim();
      if (!title) return els.title.focus();
      const startDate = els.date.value || dateKey(state.selected);
      const endDate = els.endDate.value || startDate;
      const normalizedStart = startDate <= endDate ? startDate : endDate;
      const normalizedEnd = startDate <= endDate ? endDate : startDate;
      const payload = {
        title,
        date: normalizedStart,
        endDate: normalizedEnd,
        time: els.time.value,
        type: els.type.value,
        scope: els.scope.value,
        priority: els.priority.value,
        note: els.note.value.trim()
      };
      let task;
      if (state.editingId) {
        task = state.tasks.find(item => item.id === state.editingId);
        Object.assign(task, payload);
      } else {
        task = { id: makeId(), done: false, ...payload };
        state.tasks.push(task);
      }
      state.selected = parseDate(payload.date);
      state.cursor = parseDate(payload.date);
      clearForm();
      await saveTask(task);
      render();
    });

    els.saveConfigBtn.addEventListener("click", async () => {
      const url = normalizeSupabaseUrl(els.supabaseUrl.value);
      const key = els.supabaseKey.value.trim();
      if (!url || !key) return setCloudStatus("请先填写 Project URL 和 anon public key");
      if (!/^https:\/\/[^/]+\.supabase\.co$/i.test(url)) {
        setCloudStatus("Project URL 看起来不对，应该类似：https://xxxx.supabase.co");
        els.supabaseUrl.value = url;
        return;
      }
      els.supabaseUrl.value = url;
      localStorage.setItem(configKey, JSON.stringify({ url, key }));
      await initSupabase();
    });

    els.signUpBtn.addEventListener("click", async () => {
      if (!state.supabase) return setAuthStatus("请先保存 Supabase 配置");
      const email = els.email.value.trim();
      const password = els.password.value;
      const { error } = await state.supabase.auth.signUp({ email, password });
      if (error) setAuthStatus(`注册失败：${error.message}`);
      else setAuthStatus("注册成功。如果 Supabase 开启邮箱确认，请先去邮箱确认。");
    });

    els.signInBtn.addEventListener("click", async () => {
      if (!state.supabase) return setAuthStatus("请先保存 Supabase 配置");
      const email = els.email.value.trim();
      const password = els.password.value;
      const { data, error } = await state.supabase.auth.signInWithPassword({ email, password });
      if (error) setAuthStatus(`登录失败：${error.message}`);
      else {
        state.user = data.user;
        updateAuthStatus();
        await syncLocalToCloud();
        await loadCloud();
      }
    });

    els.signOutBtn.addEventListener("click", async () => {
      if (state.supabase) await state.supabase.auth.signOut();
      state.user = null;
      updateAuthStatus();
    });

    initSupabase();
  </script>
</body>
</html>
